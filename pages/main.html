<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/styles/main.css">
    <link href="../public/assets/DataTables/datatables.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Sistema de Generación de constancias</title>
</head>

<body>
    <div class="card1">
        <form class="fs-form">
            <legend class="fs-fieldset-title">Información personal</legend>
            <div class="fs-row">
                <div class="fs-field">
                    <label class="fs-label" for="coduser">Código UNT</label>
                    <input class="fs-input" id="coduser" name="coduser" readonly />
                </div>
                <div class="fs-field">
                    <!-- <label class="fs-label" for="dniuser">DNI</label>
                    <input class="fs-input" id="dniuser" name="dniuser" readonly /> -->
                </div>
            </div>

            <div class="fs-row">
                <div class="fs-field">
                    <label class="fs-label" for="apellipat">Apellido paterno</label>
                    <input class="fs-input" id="apellipat" name="apellipat" readonly />
                </div>
                <div class="fs-field">
                    <label class="fs-label" for="apellimat">Apellido materno</label>
                    <input class="fs-input" id="apellimat" name="apellimat" readonly />
                </div>
            </div>

            <div class="fs-field">
                <label class="fs-label" for="nameuser">Nombres</label>
                <input class="fs-input" id="nameuser" name="nameuser" readonly />
            </div>
        </form>
        <div class="fs-button-group">
            <button class="btn btn-secondary btn-sm" type="" id="regresar"><i class="fa fa-arrow-left"></i>
                Regresar</button>
        </div>
    </div>

    <div class="card1">
        <div>
            <legend class="fs-fieldset-title">Historial de boletas</legend>
        </div>
        <div>
            <div class="">
                <table id="dataTable" class="display compact cell-border">
                    <thead>
                        <tr>
                            <th>Año</th>
                            <th>Mes</th>
                            <th>Tipo</th>
                            <th>Condicion</th>
                            <th>Accion</th>
                        </tr>
                    </thead>
                    <tfoot>
                        <tr>
                            <th>Año</th>
                            <th>Mes</th>
                            <th>Tipo</th>
                            <th>Condicion</th>
                            <th>Accion</th>
                        </tr>
                    </tfoot>
                    <tbody id="body-table">

                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- download constancias here -->
    <div class="card1">
        <legend class="fs-fieldset-title">Descargar constancia</legend>
        <div class="">
            <div class="fs-row">
                <div class="fs-field">
                    <label class="fs-label" for="">Modo de seleccion</label>
                    <select class="fs-input" aria-label="Default select example" name="select" id="tipoConstancia">
                        <option selected hidden>Elija..</option>
                        <option value="Especifico" class="constancia-especifica" id="constancia-especifica">Fecha específica</option>
                        <option value="Rango" class="constancia-rango" id="constancia-rango">Rango de fechas</option>
                    </select>
                </div>
                <div class="fs-field">

                </div>
            </div>
        </div>

        <!-- Panel para Especifico con acordeón de años y meses -->
        <div id="panel-especifico" class="panel-constancia" style="display: none;">
            <div class="fs-card">
                <h4>Constancia por Fecha Específica</h4>
                <p class="fs-subtitle">Seleccione los meses que desea incluir en la constancia</p>
                
                <!-- Acordeón de Años -->
                <div class="acordeon-container" id="acordeon-anios">
                    
                    <!-- <div class="acordeon-item">
                        <div class="acordeon-header">
                            <div class="anio-checkbox">
                                <input type="checkbox" class="checkbox-anio" id="anio-2024" data-anio="2024">
                                <label for="anio-2024" class="anio-label">1983</label>
                            </div>
                            <div class="header-controls">
                                <span class="acordeon-icono">+</span>
                            </div>
                        </div>
                        <div class="acordeon-contenido">
                            <div class="meses-grid">
                                <label class="mes-item">
                                    <input type="checkbox" class="checkbox-mes" data-anio="2024" data-mes="1" data-nombre="Enero">
                                    <span>Enero</span>
                                </label>
                            </div>
                        </div>
                    </div> -->
                </div>
            </div>
        </div>

        <!-- Contenedor para Rango -->
        <div id="panel-rango" class="panel-constancia" style="display: none;">
            <div class="fs-card">
                <h4>Constancia por Rango de Fechas</h4>
                <br>
                <div class="fs-row1">
                    <label class="fs-label">Fecha inicio:</label>
                    <div class="fs-col">
                        <select class="fs-input" aria-label="Default select example" name="select" id="anio-inicio">
                            <option selected hidden>Año</option>
                        </select>
                    </div>
                    <br>
                    <div class="fs-col">
                        <select class="fs-input" aria-label="Default select example" name="select" id="mes-inicio">
                            <option selected hidden>Mes</option>
                        </select>
                    </div>
                </div>

                <div class="fs-row1">
                    <label class="fs-label">Fecha fin:</label>
                    <div class="fs-col">
                        <select class="fs-input" aria-label="Default select example" name="select" id="anio-fin">
                            <option selected hidden>Año</option>
                        </select>
                    </div>
                    <br>
                    <div class="fs-col">
                        <select class="fs-input" aria-label="Default select example" name="select" id="mes-fin">
                            <option selected hidden>Mes</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <br>
        <div class="fs-button-group">
            <button class="btn btn-primary btn-sm" type=""><i class="fa fa-print"></i> Descargar constancia</button>
        </div>
    </div>

    <!-- modal para ver haberes y descuentos-->
    <div id="dataHaberDescView" class="mi-modal">
        <div class="mi-modal-contenido">
            <div class="mi-modal-header">
                <h4 id="detallesPlanilla"></h4>
                <span class="cerrar-modal">&times;</span>
            </div>
            <div class="fs-row1">
                <div class="mi-modal-body">
                    <label class="fs-label1">HABERES</label>
                    <textarea name="haberesView" id="haberesView" readonly></textarea>
                </div>
                <br>
                <div class="mi-modal-body">
                    <label class="fs-label1">DESCUENTOS</label>
                    <textarea name="descuentosView" id="descuentosView" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- scripts -->
    <script src="../public/assets/Jquery/jquery.js"></script>
    <script src="../public/assets/DataTables/datatables.js"></script>
    <script type="module" src="../src/mainRenderer.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./src/index.css">
  <title>Sistema de Generación de constancias</title>
</head>

<body>
  <div class="card">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-box">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>
        <div class="logo-text">
          <!-- <div class="dpa"></div> -->
          <div class="ura">UNIDAD DE TESORERÍA</div>
          <div class="subtitle">Área de constancias</div>
        </div>
      </div>
    </div>

    <!-- Título -->
    <h1>Sistema de generación de constancias</h1>

    <!-- Busqueda codigo Usuario -->
    <div class="form-group">
      <label for="usuario">Código trabajador <span class="required">*</span></label>
      <input type="text" id="user" name="user" maxlength="4" autocomplete="username" />
    </div>

    <a href="./pages/nombres.html" class="forgot">Buscar por nombres</a>

    <!-- Botón buscar -->
    <button class="btn-buscar"  type="button">Buscar</button>
  </div>

  <script type="module" src="./src/renderer.js"></script>
</body>
</html>

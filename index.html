<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Generacion de constancias</title>
</head>

<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-box">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>
        <div class="logo-text">
          <!-- <div class="dpa"></div> -->
          <div class="ura">UNIDAD DE TESORERÍA</div>
          <div class="subtitle">Area de constancias</div>
        </div>
      </div>
    </div>

    <!-- Título -->
    <h1>Sistema de generación de constancias</h1>

    <!-- Mensaje de error -->
    <div class="error-msg" id="error-msg">
      Por favor completa todos los campos.
    </div>

    <!-- Usuario -->
    <div class="form-group">
      <label for="usuario">Codigo trabajador <span class="required">*</span></label>
      <input type="text" id="user" name="user" maxlength="4" autocomplete="username" />
    </div>

    <a href="./pages/nombres.html" class="forgot">Buscar por nombres</a>


    <!-- Botón ingresar -->
    <button class="btn-buscar" onclick="handleLogin()" type="button">Buscar</button>

  </div>

  <script>
    const input = document.getElementById("user");
    input.addEventListener("input", function () {
      this.value = this.value.replace(/\D/g, "");
    });
  </script>

  <script>
    function handleLogin() {
      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('error-msg');

      if (!usuario || !password) {
        errorMsg.classList.add('show');
        return;
      }

      errorMsg.classList.remove('show');

      // Aquí va tu lógica de autenticación (fetch, axios, etc.)
      // Ejemplo:
      // fetch('/api/login', {
      //   method: 'POST',
      //   headers: { 'Content-Type': 'application/json' },
      //   body: JSON.stringify({ usuario, password })
      // })
      // .then(res => res.json())
      // .then(data => { window.location.href = '/dashboard'; })
      // .catch(err => console.error(err));

      alert('Login correcto! Conecta tu backend aquí.');
    }

    // Permitir Enter para iniciar sesión
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
  <script type="module" src="/src/renderer.js"></script>
</body>

</html>
